name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  MAVEN_ARGS: --batch-mode --no-transfer-progress

jobs:
  checkstyle:
    name: Checkstyle
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: |
            pom.xml
            .mvn/wrapper/maven-wrapper.properties

      - name: Run Checkstyle and generate report
        run: ./mvnw ${MAVEN_ARGS} checkstyle:checkstyle

      - name: Upload Checkstyle report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: checkstyle-report
          path: |
            target/checkstyle-result.xml
            target/checkstyle-checker.xml
            target/reports/**
          if-no-files-found: warn
          retention-days: 14

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: |
            pom.xml
            .mvn/wrapper/maven-wrapper.properties

      - name: Run tests
        # Postgres Docker Compose integration coverage should move to a dedicated integration-test job.
        run: ./mvnw ${MAVEN_ARGS} test -Dtest='!PostgresIntegrationTests'

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: surefire-reports
          path: |
            target/surefire-reports/*.xml
            target/surefire-reports/*.txt
          if-no-files-found: ignore
          retention-days: 14

  package:
    name: Build without tests
    runs-on: ubuntu-24.04
    needs:
      - checkstyle
      - test
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: |
            pom.xml
            .mvn/wrapper/maven-wrapper.properties

      - name: Package application
        run: |
          set -euo pipefail

          ./mvnw ${MAVEN_ARGS} clean package -DskipTests

          jar_list="$(mktemp)"
          find target -maxdepth 1 -type f -name "*.jar" ! -name "*-sources.jar" ! -name "*-javadoc.jar" ! -name "*.original" | sort > "${jar_list}"
          jar_count="$(wc -l < "${jar_list}" | tr -d ' ')"

          if [ "${jar_count}" -ne 1 ]; then
            echo "::error::Expected exactly one application JAR in target, found ${jar_count}."
            cat "${jar_list}"
            exit 1
          fi

          application_jar="$(sed -n '1p' "${jar_list}")"
          if [ "${application_jar}" != "target/app.jar" ]; then
            mv "${application_jar}" target/app.jar
          fi

          test -s target/app.jar

      - name: Upload app artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: app-jar
          path: target/app.jar
          if-no-files-found: error
          retention-days: 14

  docker:
    name: Docker build and push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    needs:
      - package
    if: ${{ github.event_name == 'push' || (github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download app artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: app-jar
          path: target

      - name: Verify app artifact
        run: test -s target/app.jar

      - name: Resolve image tags
        id: image
        env:
          REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
          PROJECT_ID: ${{ vars.PROJECT_ID }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          MR_DOCKER_REPO: ${{ vars.MR_DOCKER_REPO }}
          MAIN_DOCKER_REPO: ${{ vars.MAIN_DOCKER_REPO }}
        run: |
          set -euo pipefail

          for required_var in REGISTRY_HOST PROJECT_ID IMAGE_NAME MR_DOCKER_REPO MAIN_DOCKER_REPO; do
            if [ -z "${!required_var}" ]; then
              echo "::error::GitHub variable ${required_var} is not configured."
              exit 1
            fi
          done

          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            image="${REGISTRY_HOST}/${PROJECT_ID}/${MR_DOCKER_REPO}/${IMAGE_NAME}"
          else
            image="${REGISTRY_HOST}/${PROJECT_ID}/${MAIN_DOCKER_REPO}/${IMAGE_NAME}"
          fi

          {
            echo "tags<<EOF"
            echo "${image}:${GITHUB_SHA}"
            if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ${{ vars.REGISTRY_HOST }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Build and push Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: true
          tags: ${{ steps.image.outputs.tags }}
